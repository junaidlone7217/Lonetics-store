<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonetics - Premium Electronics & Essentials</title>
    <!-- Include the official EmailJS SDK library -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        try {
            // Force pure connection initialization
            emailjs.init("Tlv-gbXH55nrs32nc");
        } catch (error) {
            alert("EmailJS Failed to Load: " + error);
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        header { background-color: #1e293b; padding: 15px 20px; display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        @media (min-width: 600px) { header { flex-direction: row; justify-content: space-between; align-items: center; } }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: #06b6d4; }
        .search-container { width: 100%; max-width: 400px; position: relative; }
        .search-input { width: 100%; background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .auth-status-btn { background: none; border: 1px solid #475569; color: #cbd5e1; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 600; }
        .cart-icon { background-color: #06b6d4; color: #0f172a; padding: 6px 14px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .main-content { padding: 25px 15px; }
        .section-title { font-size: 1.3rem; margin-bottom: 20px; border-left: 4px solid #06b6d4; padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .product-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .product-img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background-color: #0f172a; }
        .product-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; min-height: 36px; }
        .product-price { font-size: 1rem; color: #06b6d4; font-weight: 700; margin-bottom: 10px; }
        .buy-btn { background-color: transparent; border: 1px solid #06b6d4; color: #06b6d4; padding: 7px 0; width: 100%; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .cart-sidebar { position: fixed; top: 0; right: -360px; width: 360px; height: 100vh; background-color: #1e293b; border-left: 1px solid #334155; z-index: 200; transition: right 0.3s; padding: 20px; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-cart { background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-total-section { border-top: 1px solid #334155; padding-top: 15px; }
        .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; }
        .checkout-btn { background-color: #06b6d4; color: #0f172a; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 300; display: flex; justify-content: center; align-items: center; visibility: hidden; opacity: 0; transition: all 0.25s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .auth-box { background-color: #1e293b; border: 1px solid #334155; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #94a3b8; font-size: 1.2rem; cursor: pointer; }
        .input-group { display: flex; flex-direction: column; gap: 4px; width: 100%; margin-bottom: 12px; }
        .input-group label { font-size: 0.75rem; color: #94a3b8; }
        .input-group input { background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; padding: 9px; border-radius: 6px; }
        .auth-submit-btn { width: 100%; margin-top: 15px; padding: 10px; background-color: #06b6d4; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #0f172a; }
        .otp-container { display: none; flex-direction: column; align-items: center; gap: 15px; }
        .otp-inputs { display: flex; gap: 10px; }
        .otp-field { width: 45px; height: 45px; background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; text-align: center; font-size: 1.2rem; color: #fff; }
        .toast-notification { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 340px; background-color: #1e293b; border: 1px solid #334155; padding: 16px; border-radius: 12px; z-index: 1000; transition: top 0.4s; }
        .toast-notification.active { top: 20px; }
    </style>
</head>
<body>

    <div class="toast-notification" id="appToast">
        <div id="toastTitle" style="font-weight:bold;">Alert</div>
        <div id="toastMessage" style="font-size:0.8rem;color:#94a3b8;">Message</div>
    </div>

    <header>
        <div class="header-top">
            <div class="logo">LONE<span>TICS</span></div>
            <div class="header-actions">
                <button class="auth-status-btn" id="openAuthModal">Sign Up</button>
                <div class="cart-icon" id="cartToggle">Cart (0)</div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <h2 class="section-title">Premium Catalog</h2>
        <div class="grid" id="productGrid"></div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="auth-box">
            <button class="modal-close" id="closeAuth">&times;</button>
            
            <div id="credentialsForm">
                <h3>Create Account</h3>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="authIdentity" placeholder="name@domain.com">
                </div>
                <button class="auth-submit-btn" id="authSubmitBtn">Send Verification OTP</button>
            </div>

            <div class="otp-container" id="otpView">
                <h3>Enter 4-Digit OTP</h3>
                <div class="otp-inputs">
                    <input type="text" class="otp-field" maxlength="1">
                    <input type="text" class="otp-field" maxlength="1">
                    <input type="text" class="otp-field" maxlength="1">
                    <input type="text" class="otp-field" maxlength="1">
                </div>
                <button class="auth-submit-btn" id="verifyOtpBtn">Verify Code</button>
            </div>
        </div>
    </div>

    <script>
        const PRODUCT_CATALOG = [
            { id: "p1", name: "Wireless Gaming Mouse", price: 49.99, image: "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=400" },
            { id: "p2", name: "Mechanical RGB Keyboard", price: 89.99, image: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400" }
        ];

        const productGrid = document.getElementById('productGrid');
        const authModal = document.getElementById('authModal');
        const openAuthModal = document.getElementById('openAuthModal');
        const closeAuth = document.getElementById('closeAuth');
        const credentialsForm = document.getElementById('credentialsForm');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const otpView = document.getElementById('otpView');
        const appToast = document.getElementById('appToast');
        const toastTitle = document.getElementById('toastTitle');
        const toastMessage = document.getElementById('toastMessage');

        let generatedOtp = "";
        let userEmailAddress = "";

        function buildMainCatalogUI() {
            productGrid.innerHTML = '';
            PRODUCT_CATALOG.forEach(p => {
                const card = document.createElement('div');
                card.classList.add('product-card');
                card.innerHTML = `
                    <img class="product-img" src="${p.image}">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">$${p.price}</div>
                    <button class="buy-btn">Add To Cart</button>
                `;
                productGrid.appendChild(card);
            });
        }

        openAuthModal.addEventListener('click', () => {
            authModal.classList.add('active');
        });
        closeAuth.addEventListener('click', () => authModal.classList.remove('active'));

        authSubmitBtn.addEventListener('click', () => {
            const emailVal = document.getElementById('authIdentity').value.trim();
            if(!emailVal) { alert("Enter an email"); return; }
            
            userEmailAddress = emailVal;
            generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();

            toastTitle.textContent = "Processing...";
            toastMessage.textContent = "Connecting to your custom mail servers...";
            appToast.classList.add('active');

            // Pure production parameter maps
            const templateParams = {
                email: userEmailAddress,
                to_email: userEmailAddress,
                otp_code: generatedOtp
            };

            emailjs.send("service_oofkjro", "template_sorgfz4", templateParams)
                .then(() => {
                    appToast.classList.remove('active');
                    credentialsForm.style.display = 'none';
                    otpView.style.display = 'flex';
                    alert("Success! OTP has been generated and sent to " + userEmailAddress);
                })
                .catch((err) => {
                    appToast.classList.remove('active');
                    // This explicitly alerts the raw dashboard error string string to find what it dislikes
                    alert("EmailJS Reject Reason:\n" + JSON.stringify(err));
                });
        });

        buildMainCatalogUI();
    </script>
</body>
</html>
