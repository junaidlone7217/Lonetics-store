<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Installation Force Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Lonetics">
    <meta name="apple-mobile-web-app-title" content="Lonetics">
    <meta name="theme-color" content="#0f172a">
    
    <title>Lonetics - Premium Electronics</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #060b13;
            --bg-surface: #0f172a;
            --accent: #2563eb;
            --accent-light: #38bdf8;
            --text-main: #f8fafc;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg-primary); color: var(--text-main); padding-bottom: 80px; }
        
        /* Premium Header */
        header { background: var(--bg-surface); padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--text-main); }
        .logo span { color: var(--accent-light); }
        
        /* Premium Install Banner Animation */
        .install-prompt-ui { display: none; background: linear-gradient(135deg, #2563eb, #38bdf8); padding: 20px; border-radius: 16px; margin: 16px; text-align: center; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        
        .btn-install { background: #fff; color: var(--accent); padding: 12px 24px; border-radius: 8px; font-weight: 800; border: none; cursor: pointer; margin-top: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
        .card { background: var(--bg-surface); border-radius: 12px; padding: 12px; }
        .img-placeholder { height: 120px; background: #1e293b; border-radius: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">LONE<span>TICS</span></div>
        <div id="installTrigger" style="cursor:pointer;">Get App</div>
    </header>

    <div id="installContainer" class="install-prompt-ui">
        <h3>Install Lonetics</h3>
        <p>Get faster access & 25% off.</p>
        <button class="btn-install" onclick="installApp()">Install App Now</button>
    </div>

    <div class="grid" id="productGrid"></div>

    <script>
        // PWA Install Logic
        let deferredPrompt;
        const installContainer = document.getElementById('installContainer');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installContainer.style.display = 'none';
                deferredPrompt = null;
            }
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
        }
    </script>
</body>
</html>
