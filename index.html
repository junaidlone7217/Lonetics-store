<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Installation Force Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Lonetics">
    <meta name="apple-mobile-web-app-title" content="Lonetics">
    <meta name="theme-color" content="#0f172a">
    
    <title>Lonetics - Premium Electronics</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #060b13; --bg-surface: #0f172a; --accent: #2563eb; 
            --accent-light: #38bdf8; --text-main: #f8fafc;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg-primary); color: var(--text-main); padding-bottom: 80px; }
        
        header { background: var(--bg-surface); padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--text-main); }
        .logo span { color: var(--accent-light); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
        .card { background: var(--bg-surface); border-radius: 12px; padding: 12px; border: 1px solid #1e293b; }
        .img-placeholder { height: 120px; background: #060b13; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
        .img-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .buy-btn { width: 100%; padding: 8px; background: var(--accent); color: white; border: none; border-radius: 6px; margin-top: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">LONE<span>TICS</span></div>
        <div id="installTrigger" style="cursor:pointer; font-weight:bold; color:var(--accent-light);">Get App</div>
    </header>

    <div class="grid" id="productGrid">
        <p style="grid-column: 1/-1; text-align: center; margin-top: 50px;">Loading your store...</p>
    </div>

    <script>
        // Database & PWA Logic
        const firebaseConfig = {
            apiKey: "AIzaSyA5CaVG6SAkGu5Z0ffJoT8Qqe1pkhOvNMA",
            authDomain: "lonetics-store.firebaseapp.com",
            projectId: "lonetics-store",
            storageBucket: "lonetics-store.firebasestorage.app",
            messagingSenderId: "1037550611605",
            appId: "1:1037550611605:web:21645faf582e61e3947f9c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Products
        db.collection("products").onSnapshot((snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="card">
                        <div class="img-placeholder"><img src="${p.image}"></div>
                        <p style="font-size:0.9rem;">${p.name}</p>
                        <button class="buy-btn">₹${p.price}</button>
                    </div>
                `;
            });
        });

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        document.getElementById('installTrigger').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
            } else {
                alert("To install, tap the 3 dots in Chrome and select 'Install App'");
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail', err));
        }
    </script>
</body>
</html>
